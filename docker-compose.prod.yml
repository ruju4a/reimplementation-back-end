# Production-style compose for VPS / VCL. Copy .env.example to .env.production and edit.
# Do not use ${VAR} substitution — use env_file so DB password and DATABASE_URL reach
# containers reliably (Compose would otherwise warn "variable not set").
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  app:
    build: .
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
    ports:
      - "3002:3002"
    depends_on:
      - db
      - redis

  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - prod-mysql:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  prod-mysql:
